<!DOCTYPE html>
<html>
<head>
    <title>Resume Analysis Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/result.css') }}">
</head>
<body>

<div class="container">

    <h1>Resume Analysis Result</h1>

    <div class="card">

        <h2>Detected Skills</h2>

        <ul>
            {% for skill in skills %}
            <li>✓ {{ skill }}</li>
            {% endfor %}
        </ul>

        <h2>Match Score</h2>

        <div class="score">
            {{ score }}%
        </div>

        <div class="progress">
            <div class="progress-fill"
                 style="width: {{ score }}%">
            </div>
        </div>

        <a href="/" class="btn">
            Upload Another Resume
        </a>

    </div>

</div>

</body>
</html>
